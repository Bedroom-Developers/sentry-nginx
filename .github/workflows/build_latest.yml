name: Sentry Nginx Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/bedroom-developers/sentry-nginx

jobs:
  meta:
    name: Resolve Image Metadata
    runs-on: ubuntu-24.04
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Set metadata
        id: meta
        run: |
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tag=latest" >> $GITHUB_OUTPUT

  docker-amd64:
    name: Build amd64 image
    needs: meta
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and Push amd64
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.meta.outputs.image_name }}:${{ needs.meta.outputs.tag }}-amd64

  docker-arm64:
    name: Build arm64 image
    needs: meta
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and Push arm64
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ needs.meta.outputs.image_name }}:${{ needs.meta.outputs.tag }}-arm64

  combine-manifests:
    name: Combine amd64 and arm64 manifests
    needs: [meta, docker-amd64, docker-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Create and push manifests
        run: |
          IMAGE_NAME="${{ needs.meta.outputs.image_name }}"
          TAG="${{ needs.meta.outputs.tag }}"

          docker buildx imagetools create -t ${IMAGE_NAME}:${TAG} \
            ${IMAGE_NAME}:${TAG}-amd64 \
            ${IMAGE_NAME}:${TAG}-arm64